name: Build & Pack Extension

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npx tsc --noEmit

      - name: Lint
        run: npx eslint src/ --ext .ts

      - name: Build
        run: npm run build

      - name: Pack CRX
        env:
          EXTENSION_KEY: ${{ secrets.EXTENSION_KEY }}
        run: |
          if [ -z "$EXTENSION_KEY" ]; then
            echo "EXTENSION_KEY secret not set, skipping CRX packing"
            exit 0
          fi
          echo "$EXTENSION_KEY" > key.pem
          npx crx pack dist/chrome -o wordsnap.crx -p key.pem
          rm key.pem

      - name: Pack Firefox artifact
        run: cd dist/firefox && zip -r ../../wordsnap-firefox.xpi .

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: wordsnap-dist
          path: dist/

      - name: Upload Firefox artifact
        uses: actions/upload-artifact@v4
        with:
          name: wordsnap-firefox
          path: wordsnap-firefox.xpi

      - name: Upload CRX artifact
        if: env.EXTENSION_KEY != ''
        uses: actions/upload-artifact@v4
        with:
          name: wordsnap-crx
          path: wordsnap.crx
        env:
          EXTENSION_KEY: ${{ secrets.EXTENSION_KEY }}

  release:
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/download-artifact@v4
        with:
          name: wordsnap-dist
          path: dist/

      - uses: actions/download-artifact@v4
        with:
          name: wordsnap-firefox

      - uses: actions/download-artifact@v4
        continue-on-error: true
        with:
          name: wordsnap-crx

      - name: Zip dist
        run: cd dist && zip -r ../wordsnap.zip .

      - name: Collect release files
        id: release_files
        shell: bash
        run: |
          files=()
          for file in wordsnap.zip wordsnap-firefox.xpi wordsnap.crx; do
            if [ -f "$file" ]; then
              files+=("$file")
            fi
          done
          {
            echo 'files<<EOF'
            printf '%s\n' "${files[@]}"
            echo 'EOF'
          } >> "$GITHUB_OUTPUT"

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ steps.release_files.outputs.files }}
          generate_release_notes: true
