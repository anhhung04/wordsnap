<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>WordSnap - Vocabulary Notes</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --color-primary: #2563EB;
      --color-primary-hover: #1d4ed8;
      --color-primary-light: #eff6ff;
      --color-bg: #F8FAFC;
      --color-surface: #ffffff;
      --color-text: #1E293B;
      --color-text-secondary: #64748b;
      --color-text-muted: #94a3b8;
      --color-border: #e2e8f0;
      --color-error: #dc2626;
      --radius-sm: 6px;
      --radius-md: 10px;
      --radius-lg: 16px;
      --shadow-sm: 0 1px 2px rgba(0,0,0,0.05);
      --shadow-md: 0 4px 12px rgba(0,0,0,0.08);
      --transition: 200ms cubic-bezier(0.4, 0, 0.2, 1);
      --font: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    }
    body {
      font-family: var(--font);
      background: var(--color-bg);
      color: var(--color-text);
      padding: 40px 20px;
      line-height: 1.6;
      -webkit-font-smoothing: antialiased;
    }
    .container {
      max-width: 720px;
      margin: 0 auto;
    }
    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 24px;
      flex-wrap: wrap;
      gap: 12px;
    }
    .header-left {
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .header-icon {
      width: 32px;
      height: 32px;
      border-radius: var(--radius-sm);
      background: var(--color-primary);
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .header-icon svg { width: 18px; height: 18px; }
    h1 {
      font-size: 20px;
      font-weight: 700;
      color: var(--color-text);
      letter-spacing: -0.02em;
    }
    .header-actions {
      display: flex;
      gap: 8px;
    }
    .search-bar {
      margin-bottom: 16px;
      position: relative;
    }
    .search-bar svg {
      position: absolute;
      left: 14px;
      top: 50%;
      transform: translateY(-50%);
      width: 16px;
      height: 16px;
      color: var(--color-text-muted);
      pointer-events: none;
    }
    .search-bar input {
      width: 100%;
      padding: 11px 14px 11px 40px;
      border: 1px solid var(--color-border);
      border-radius: var(--radius-md);
      font-size: 14px;
      font-family: var(--font);
      color: var(--color-text);
      background: var(--color-surface);
      transition: border-color var(--transition), box-shadow var(--transition);
      outline: none;
    }
    .search-bar input:focus {
      border-color: var(--color-primary);
      box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.1);
    }
    .search-bar input::placeholder { color: var(--color-text-muted); }
    .notes-list {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }
    .note-card {
      background: var(--color-surface);
      border-radius: var(--radius-md);
      padding: 16px 20px;
      box-shadow: var(--shadow-sm);
      border: 1px solid var(--color-border);
      transition: box-shadow var(--transition), transform var(--transition);
    }
    .note-card:hover {
      box-shadow: var(--shadow-md);
      transform: translateY(-1px);
    }
    .note-header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      margin-bottom: 6px;
    }
    .note-word {
      font-size: 17px;
      font-weight: 600;
      color: var(--color-primary);
      letter-spacing: -0.01em;
    }
    .note-translation {
      font-size: 15px;
      color: var(--color-text);
      margin-bottom: 8px;
    }
    .note-context {
      font-size: 13px;
      color: var(--color-text-secondary);
      font-style: italic;
      margin-bottom: 8px;
      border-left: 3px solid var(--color-border);
      padding-left: 10px;
      line-height: 1.5;
    }
    .note-meta {
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 12px;
      color: var(--color-text-muted);
    }
    .note-source a {
      color: var(--color-primary);
      text-decoration: none;
      font-weight: 500;
    }
    .note-source a:hover { text-decoration: underline; }
    .note-tags {
      display: flex;
      gap: 4px;
      margin-top: 8px;
    }
    .tag {
      background: var(--color-primary-light);
      color: var(--color-primary);
      padding: 2px 10px;
      border-radius: 20px;
      font-size: 11px;
      font-weight: 500;
    }
    button {
      padding: 8px 14px;
      border: none;
      border-radius: var(--radius-sm);
      font-size: 13px;
      font-family: var(--font);
      font-weight: 500;
      cursor: pointer;
      transition: all var(--transition);
      outline: none;
    }
    button:focus-visible {
      box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.3);
    }
    .btn-export {
      background: var(--color-primary-light);
      color: var(--color-primary);
      border: 1px solid transparent;
    }
    .btn-export:hover { background: #dbeafe; border-color: var(--color-primary); }
    .btn-delete {
      background: none;
      color: var(--color-text-muted);
      font-size: 14px;
      padding: 4px 8px;
      border-radius: var(--radius-sm);
    }
    .btn-delete:hover { color: var(--color-error); background: #fef2f2; }
    .empty-state {
      text-align: center;
      padding: 64px 24px;
      color: var(--color-text-muted);
    }
    .empty-state svg {
      width: 48px;
      height: 48px;
      margin-bottom: 16px;
      color: var(--color-border);
    }
    .empty-state h2 {
      font-size: 16px;
      margin-bottom: 8px;
      color: var(--color-text-secondary);
      font-weight: 600;
    }
    .empty-state p { font-size: 14px; }
    .count {
      font-size: 13px;
      color: var(--color-text-muted);
      font-weight: 500;
    }
    .toolbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 12px;
      gap: 8px;
    }
    .toolbar-right {
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .toolbar-right select {
      padding: 6px 10px;
      border: 1px solid var(--color-border);
      border-radius: var(--radius-sm);
      font-size: 12px;
      font-family: var(--font);
      color: var(--color-text-secondary);
      background: var(--color-surface);
      cursor: pointer;
      outline: none;
      transition: border-color var(--transition);
    }
    .toolbar-right select:focus { border-color: var(--color-primary); }
    .btn-review {
      display: flex;
      align-items: center;
      gap: 5px;
      background: var(--color-primary);
      color: white;
      font-size: 12px;
      padding: 6px 12px;
    }
    .btn-review:hover { background: var(--color-primary-hover); }
    .btn-review:disabled { opacity: 0.5; cursor: default; }

    /* Flashcard review overlay */
    .review-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.5);
      z-index: 1000;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    .review-modal {
      background: var(--color-surface);
      border-radius: var(--radius-lg);
      box-shadow: 0 16px 48px rgba(0,0,0,0.2);
      width: 100%;
      max-width: 440px;
      padding: 24px;
      animation: slideUp 250ms cubic-bezier(0.16, 1, 0.3, 1);
    }
    @keyframes slideUp {
      from { opacity: 0; transform: translateY(16px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .review-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 20px;
    }
    .review-progress {
      font-size: 13px;
      color: var(--color-text-muted);
      font-weight: 500;
    }
    .review-close {
      background: none;
      font-size: 22px;
      color: var(--color-text-muted);
      padding: 4px 8px;
      line-height: 1;
    }
    .review-close:hover { color: var(--color-text); }
    .review-card {
      text-align: center;
      min-height: 160px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }
    .review-word {
      font-size: 28px;
      font-weight: 700;
      color: var(--color-primary);
      margin-bottom: 12px;
      letter-spacing: -0.02em;
    }
    .review-answer { width: 100%; }
    .review-translation {
      font-size: 18px;
      color: var(--color-text);
      font-weight: 500;
      margin-bottom: 8px;
    }
    .review-context {
      font-size: 13px;
      color: var(--color-text-secondary);
      font-style: italic;
      max-width: 360px;
      margin: 0 auto;
    }
    .review-actions, .review-nav {
      display: flex;
      justify-content: center;
      gap: 10px;
      margin-top: 20px;
    }
    .btn-reveal {
      background: var(--color-primary);
      color: white;
      padding: 10px 24px;
      font-size: 14px;
    }
    .btn-reveal:hover { background: var(--color-primary-hover); }
    .btn-know {
      background: #16a34a;
      color: white;
      padding: 10px 20px;
      font-size: 13px;
    }
    .btn-know:hover { background: #15803d; }
    .btn-next {
      background: var(--color-primary-light);
      color: var(--color-primary);
      border: 1px solid var(--color-primary);
      padding: 10px 20px;
      font-size: 13px;
    }
    .btn-next:hover { background: #dbeafe; }

    @media (prefers-color-scheme: dark) {
      :root {
        --color-bg: #0f172a;
        --color-surface: #1e293b;
        --color-text: #f1f5f9;
        --color-text-secondary: #94a3b8;
        --color-text-muted: #64748b;
        --color-border: #334155;
        --color-primary-light: #1e3a5f;
      }
      .search-bar input { background: #0f172a; }
      .btn-delete:hover { background: #450a0a; }
      .toolbar-right select { background: #0f172a; color: #94a3b8; }
      .review-modal { background: #1e293b; }
      .btn-next { background: #1e3a5f; border-color: #3b82f6; }
    }

    @media (max-width: 600px) {
      body { padding: 20px 12px; }
      header { flex-direction: column; align-items: flex-start; }
      .note-card { padding: 14px 16px; }
    }

    @media (prefers-reduced-motion: reduce) {
      * { transition: none !important; transform: none !important; }
    }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <div class="header-left">
        <div class="header-icon">
          <svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <path d="M12 20h9"/><path d="M16.5 3.5a2.121 2.121 0 013 3L7 19l-4 1 1-4L16.5 3.5z"/>
          </svg>
        </div>
        <h1>Vocabulary Notes</h1>
      </div>
      <div class="header-actions">
        <button class="btn-export" id="exportJson">Export JSON</button>
        <button class="btn-export" id="exportCsv">Export CSV</button>
      </div>
    </header>

    <div class="search-bar">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
      <input type="text" id="searchInput" placeholder="Search words, translations, or tags...">
    </div>

    <div class="toolbar">
      <div class="count" id="count"></div>
      <div class="toolbar-right">
        <select id="sortSelect" aria-label="Sort notes">
          <option value="newest">Newest first</option>
          <option value="oldest">Oldest first</option>
          <option value="az">A - Z</option>
          <option value="za">Z - A</option>
        </select>
        <button class="btn-review" id="reviewBtn" title="Review words as flashcards">
          <svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="3" width="20" height="14" rx="2"/><path d="M8 21h8"/><path d="M12 17v4"/></svg>
          Review
        </button>
      </div>
    </div>

    <div class="notes-list" id="notesList"></div>

    <!-- Flashcard review modal -->
    <div class="review-overlay" id="reviewOverlay" style="display:none">
      <div class="review-modal">
        <div class="review-header">
          <span class="review-progress" id="reviewProgress">1 / 10</span>
          <button class="review-close" id="reviewClose" title="Close" aria-label="Close review">&times;</button>
        </div>
        <div class="review-card" id="reviewCard">
          <div class="review-word" id="reviewWord"></div>
          <div class="review-answer" id="reviewAnswer" style="display:none">
            <div class="review-translation" id="reviewTranslation"></div>
            <div class="review-context" id="reviewContext"></div>
          </div>
        </div>
        <div class="review-actions" id="reviewActions">
          <button class="btn-reveal" id="revealBtn">Show Answer</button>
        </div>
        <div class="review-nav" id="reviewNav" style="display:none">
          <button class="btn-know" id="knowBtn">I know this</button>
          <button class="btn-next" id="nextBtn">Next</button>
        </div>
      </div>
    </div>
  </div>

  <script type="module" src="./index.ts"></script>
</body>
</html>
