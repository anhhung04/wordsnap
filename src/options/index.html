<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>WordSnap - Options</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --color-primary: #2563EB;
      --color-primary-hover: #1d4ed8;
      --color-primary-light: #eff6ff;
      --color-secondary: #3B82F6;
      --color-bg: #F8FAFC;
      --color-surface: #ffffff;
      --color-text: #1E293B;
      --color-text-secondary: #64748b;
      --color-text-muted: #94a3b8;
      --color-border: #e2e8f0;
      --color-border-focus: #2563EB;
      --color-success: #16a34a;
      --color-error: #dc2626;
      --color-warning: #f59e0b;
      --radius-sm: 6px;
      --radius-md: 10px;
      --radius-lg: 16px;
      --shadow-sm: 0 1px 2px rgba(0,0,0,0.05);
      --shadow-md: 0 4px 12px rgba(0,0,0,0.08);
      --shadow-lg: 0 8px 24px rgba(0,0,0,0.12);
      --transition: 200ms cubic-bezier(0.4, 0, 0.2, 1);
      --font: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    }
    body {
      font-family: var(--font);
      background: var(--color-bg);
      color: var(--color-text);
      padding: 48px 20px;
      line-height: 1.6;
      -webkit-font-smoothing: antialiased;
    }
    .container {
      max-width: 560px;
      margin: 0 auto;
      background: var(--color-surface);
      border-radius: var(--radius-lg);
      padding: 40px;
      box-shadow: var(--shadow-md);
      border: 1px solid var(--color-border);
    }
    .logo-header {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 6px;
    }
    .logo-icon {
      width: 36px;
      height: 36px;
      border-radius: var(--radius-sm);
      background: var(--color-primary);
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .logo-icon svg {
      width: 20px;
      height: 20px;
    }
    h1 {
      font-size: 22px;
      font-weight: 700;
      color: var(--color-text);
      letter-spacing: -0.02em;
    }
    .subtitle {
      font-size: 14px;
      color: var(--color-text-muted);
      margin-bottom: 32px;
    }
    .divider {
      height: 1px;
      background: var(--color-border);
      margin: 28px 0;
    }
    .section-title {
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: var(--color-text-muted);
      margin-bottom: 16px;
    }
    .field {
      margin-bottom: 20px;
    }
    label {
      display: block;
      font-size: 14px;
      font-weight: 500;
      color: var(--color-text);
      margin-bottom: 6px;
    }
    input[type="text"], input[type="password"], select {
      width: 100%;
      padding: 10px 14px;
      border: 1px solid var(--color-border);
      border-radius: var(--radius-sm);
      font-size: 14px;
      font-family: var(--font);
      color: var(--color-text);
      background: var(--color-surface);
      transition: border-color var(--transition), box-shadow var(--transition);
      outline: none;
    }
    input:focus, select:focus {
      border-color: var(--color-border-focus);
      box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.1);
    }
    input::placeholder {
      color: var(--color-text-muted);
    }
    .help {
      font-size: 12px;
      color: var(--color-text-muted);
      margin-top: 6px;
      line-height: 1.5;
    }
    .help a {
      color: var(--color-primary);
      text-decoration: none;
      font-weight: 500;
    }
    .help a:hover { text-decoration: underline; }
    .input-with-btn {
      display: flex;
      gap: 8px;
    }
    .input-with-btn input { flex: 1; }
    .actions {
      display: flex;
      gap: 12px;
      margin-top: 32px;
    }
    button {
      padding: 10px 20px;
      border: none;
      border-radius: var(--radius-sm);
      font-size: 14px;
      font-family: var(--font);
      font-weight: 500;
      cursor: pointer;
      transition: all var(--transition);
      outline: none;
    }
    button:focus-visible {
      box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.3);
    }
    .btn-primary {
      background: var(--color-primary);
      color: white;
    }
    .btn-primary:hover { background: var(--color-primary-hover); transform: translateY(-1px); }
    .btn-primary:active { transform: translateY(0); }
    .btn-secondary {
      background: var(--color-bg);
      color: var(--color-text-secondary);
      border: 1px solid var(--color-border);
    }
    .btn-secondary:hover { background: var(--color-border); }
    .btn-test {
      background: var(--color-primary-light);
      color: var(--color-primary);
      white-space: nowrap;
      padding: 10px 16px;
      font-weight: 500;
      border: 1px solid transparent;
    }
    .btn-test:hover { background: #dbeafe; border-color: var(--color-primary); }
    .btn-test:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }
    .test-result {
      font-size: 13px;
      margin-top: 8px;
      padding: 8px 12px;
      border-radius: var(--radius-sm);
      display: none;
      line-height: 1.4;
    }
    .test-result.success {
      display: block;
      color: var(--color-success);
      background: #f0fdf4;
      border: 1px solid #bbf7d0;
    }
    .test-result.error {
      display: block;
      color: var(--color-error);
      background: #fef2f2;
      border: 1px solid #fecaca;
    }
    .test-result.loading {
      display: block;
      color: var(--color-text-secondary);
      background: var(--color-bg);
      border: 1px solid var(--color-border);
    }
    .status {
      margin-top: 16px;
      padding: 10px 14px;
      font-size: 13px;
      border-radius: var(--radius-sm);
      display: none;
      color: var(--color-success);
      background: #f0fdf4;
      border: 1px solid #bbf7d0;
    }
    .status.error {
      color: var(--color-error);
      background: #fef2f2;
      border-color: #fecaca;
    }
    .nav-link {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      margin-top: 20px;
      color: var(--color-primary);
      text-decoration: none;
      font-size: 14px;
      font-weight: 500;
      padding: 8px 0;
      transition: opacity var(--transition);
    }
    .nav-link:hover { opacity: 0.8; }
    .nav-link svg { width: 16px; height: 16px; }

    @media (prefers-color-scheme: dark) {
      :root {
        --color-bg: #0f172a;
        --color-surface: #1e293b;
        --color-text: #f1f5f9;
        --color-text-secondary: #94a3b8;
        --color-text-muted: #64748b;
        --color-border: #334155;
        --color-primary-light: #1e3a5f;
      }
      input, select { background: #0f172a; }
      .test-result.success { background: #052e16; border-color: #166534; }
      .test-result.error { background: #450a0a; border-color: #991b1b; }
      .status { background: #052e16; border-color: #166534; }
      .status.error { background: #450a0a; border-color: #991b1b; }
    }

    @media (prefers-reduced-motion: reduce) {
      * { transition: none !important; transform: none !important; }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="logo-header">
      <div class="logo-icon">
        <svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <path d="M4 7V4h16v3"/><path d="M9 20h6"/><path d="M12 4v16"/>
        </svg>
      </div>
      <h1>WordSnap</h1>
    </div>
    <p class="subtitle">Lightweight English learning extension</p>

    <div class="section-title">AI Translation</div>

    <div class="field">
      <label for="apiKey">Gemini API Key <span style="color:var(--color-text-muted);font-weight:400">(optional)</span></label>
      <div class="input-with-btn">
        <input type="password" id="apiKey" placeholder="Enter your Google Gemini API key">
        <button class="btn-test" id="testKeyBtn">Test</button>
      </div>
      <p class="help">Enables AI-enhanced translations. Get a free key at <a href="https://aistudio.google.com/app/apikey" target="_blank">Google AI Studio</a></p>
      <div class="test-result" id="testResult"></div>
    </div>

    <div class="divider"></div>
    <div class="section-title">Preferences</div>

    <div class="field">
      <label for="targetLang">Target Language</label>
      <select id="targetLang">
        <option value="vi">Vietnamese (Tiếng Việt)</option>
        <option value="zh">Chinese (中文)</option>
        <option value="ja">Japanese (日本語)</option>
        <option value="ko">Korean (한국어)</option>
        <option value="es">Spanish (Español)</option>
        <option value="fr">French (Français)</option>
        <option value="de">German (Deutsch)</option>
        <option value="pt">Portuguese (Português)</option>
        <option value="ru">Russian (Русский)</option>
        <option value="th">Thai (ไทย)</option>
        <option value="id">Indonesian (Bahasa Indonesia)</option>
      </select>
    </div>

    <div class="field">
      <label for="triggerMethod">Popup Trigger</label>
      <select id="triggerMethod">
        <option value="select">Show icon on text selection</option>
        <option value="double-click">Show icon on double-click</option>
      </select>
    </div>

    <div class="field">
      <label for="theme">Theme</label>
      <select id="theme">
        <option value="auto">Auto (follow system)</option>
        <option value="light">Light</option>
        <option value="dark">Dark</option>
      </select>
    </div>

    <div class="actions">
      <button class="btn-primary" id="saveBtn">Save Settings</button>
      <button class="btn-secondary" id="resetBtn">Reset Defaults</button>
    </div>

    <div class="status" id="status">Settings saved!</div>

    <a href="notes/index.html" class="nav-link" id="notesLink">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 20h9"/><path d="M16.5 3.5a2.121 2.121 0 013 3L7 19l-4 1 1-4L16.5 3.5z"/></svg>
      View Vocabulary Notes
    </a>
  </div>

  <script type="module" src="./index.ts"></script>
</body>
</html>
